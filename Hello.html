<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Racer 2077 | Drag Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #000; 
            font-family: 'Courier New', monospace;
            user-select: none;
            touch-action: none; /* Scrolling disable karne ke liye */
        }
        canvas { display: block; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0015 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 30px; }
        .menu-hidden { display: none !important; }
        .menu-title { font-size: 60px; color: #00f2ff; text-shadow: 0 0 30px #00f2ff; letter-spacing: 3px; margin-bottom: 20px; }
        .car-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .car-option { border: 3px solid #00f2ff; padding: 20px; background: rgba(0, 242, 255, 0.1); border-radius: 10px; cursor: pointer; transition: all 0.3s; text-align: center; min-width: 120px; }
        .car-option:hover { border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff; }
        .car-option.selected { border-color: #ffff00; box-shadow: 0 0 40px #ffff00; }
        .car-preview { font-size: 50px; margin-bottom: 10px; }
        .car-name { font-size: 14px; color: #00f2ff; }
        .difficulty-selector { display: flex; gap: 20px; }
        .difficulty-btn { padding: 12px 30px; border: 2px solid #00f2ff; background: rgba(0, 242, 255, 0.1); color: #00f2ff; cursor: pointer; font-family: 'Courier New', monospace; font-size: 13px; transition: all 0.3s; border-radius: 5px; }
        .difficulty-btn.selected { border-color: #ffff00; box-shadow: 0 0 30px #ffff00; }
        .start-btn { padding: 15px 50px; font-size: 20px; border: 3px solid #00f2ff; background: rgba(0, 242, 255, 0.1); color: #00f2ff; cursor: pointer; letter-spacing: 2px; font-family: 'Courier New', monospace; transition: all 0.3s; border-radius: 5px; text-transform: uppercase; }
        .start-btn:hover { box-shadow: 0 0 40px #00f2ff; background: rgba(0, 242, 255, 0.3); }
        #score-display { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: bold; color: #ffff00; text-shadow: 0 0 40px #ffff00; pointer-events: none; z-index: 5; letter-spacing: 2px; }
        #hud { position: fixed; bottom: 20px; left: 20px; z-index: 10; display: flex; gap: 15px; }
        .control-btn { padding: 10px 15px; border: 2px solid #00f2ff; background: rgba(0, 242, 255, 0.1); color: #00f2ff; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; transition: all 0.3s; border-radius: 3px; }
        #game-over-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); display: none; align-items: center; justify-content: center; z-index: 50; }
        .game-over-content { border: 3px solid #ff00ff; padding: 50px; background: rgba(0, 0, 0, 0.95); text-align: center; box-shadow: 0 0 60px #ff00ff; border-radius: 10px; color: #00f2ff; max-width: 600px; }
        .game-over-title { font-size: 48px; margin-bottom: 25px; color: #ff00ff; letter-spacing: 2px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .stat-box { border: 1px solid #00f2ff; padding: 15px; background: rgba(0, 242, 255, 0.1); border-radius: 5px; }
        .stat-box-value { font-size: 28px; color: #ffff00; }
        .restart-btn { margin-top: 25px; padding: 12px 40px; font-size: 16px; border: 2px solid #00f2ff; background: rgba(0, 242, 255, 0.1); color: #00f2ff; cursor: pointer; letter-spacing: 2px; font-family: 'Courier New', monospace; box-shadow: 0 0 15px #00f2ff; border-radius: 5px; transition: all 0.3s; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-title">⚡ CYBER-RACER 2077 ⚡</div>
        <div>
            <div style="color: #00f2ff; font-size: 16px; margin-bottom: 15px;">SELECT YOUR CAR</div>
            <div class="car-selector" id="carSelector"></div>
        </div>
        <div>
            <div style="color: #00f2ff; font-size: 16px; margin-bottom: 10px;">DIFFICULTY</div>
            <div class="difficulty-selector">
                <button class="difficulty-btn selected" data-difficulty="NORMAL">NORMAL</button>
                <button class="difficulty-btn" data-difficulty="HARD">HARD</button>
                <button class="difficulty-btn" data-difficulty="INSANE">INSANE</button>
            </div>
        </div>
        <button class="start-btn" id="startBtn">START GAME</button>
    </div>

    <div id="score-display">0</div>

    <div id="hud" style="display: none;">
        <button class="control-btn" id="soundBtn">🔊</button>
        <button class="control-btn" id="pauseBtn">⏸</button>
    </div>

    <div id="game-over-modal">
        <div class="game-over-content">
            <div class="game-over-title">GAME OVER</div>
            <div class="game-over-stat">FINAL SCORE: <span id="finalScore">0</span></div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-box-value" id="finalLevel">1</div><div class="stat-box-label">LEVEL</div></div>
                <div class="stat-box"><div class="stat-box-value" id="finalTime">0s</div><div class="stat-box-label">TIME</div></div>
                <div class="stat-box"><div class="stat-box-value" id="finalCombo">0</div><div class="stat-box-label">COMBO</div></div>
                <div class="stat-box"><div class="stat-box-value" id="finalDist">0</div><div class="stat-box-label">DISTANCE</div></div>
            </div>
            <button class="restart-btn" id="restartBtn">BACK TO MENU</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // Database aur States bilkul wahi hain jo aapne diye thay
        const CARS = [
            { id: 'cyber', name: 'CYBER', emoji: '🚗', color: '#00f2ff', speed: 12 },
            { id: 'turbo', name: 'TURBO', emoji: '🏎️', color: '#ffff00', speed: 15 },
            { id: 'tank', name: 'TANK', emoji: '🛡️', color: '#00ff00', speed: 10 },
            { id: 'phantom', name: 'PHANTOM', emoji: '👻', color: '#ff00ff', speed: 13 },
            { id: 'nexus', name: 'NEXUS', emoji: '⚡', color: '#ff8800', speed: 14 },
            { id: 'nova', name: 'NOVA', emoji: '✨', color: '#00ffff', speed: 11 }
        ];

        const DIFFICULTY = {
            NORMAL: { spawnRate: 40, speedMult: 1, scoreMult: 1 },
            HARD: { spawnRate: 25, speedMult: 1.2, scoreMult: 1.5 },
            INSANE: { spawnRate: 15, speedMult: 1.4, scoreMult: 2 }
        };

        let gameState = {
            selectedCar: 'cyber',
            selectedDifficulty: 'NORMAL',
            isRunning: false,
            game: null,
            isDragging: false // New drag state
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function initMenu() {
            const selector = document.getElementById('carSelector');
            selector.innerHTML = CARS.map(car => `
                <div class="car-option" onclick="selectCar('${car.id}')">
                    <div class="car-preview">${car.emoji}</div>
                    <div class="car-name">${car.name}</div>
                </div>
            `).join('');
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    gameState.selectedDifficulty = this.dataset.difficulty;
                });
            });
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', () => location.reload());
            selectCar('cyber');
        }

        function selectCar(carId) {
            gameState.selectedCar = carId;
            document.querySelectorAll('.car-option').forEach((el, idx) => {
                el.classList.toggle('selected', CARS[idx].id === carId);
            });
        }

        function startGame() {
            document.getElementById('menu').classList.add('menu-hidden');
            document.getElementById('hud').style.display = 'flex';
            gameState.game = createGameInstance();
            gameState.isRunning = true;
            gameLoop();
        }

        function createGameInstance() {
            const car = CARS.find(c => c.id === gameState.selectedCar);
            const difficulty = DIFFICULTY[gameState.selectedDifficulty];
            return {
                car: car,
                difficulty: difficulty,
                score: 0,
                combo: 0,
                maxCombo: 0,
                level: 1,
                speed: car.speed * difficulty.speedMult,
                gameActive: true,
                isPaused: false,
                soundEnabled: true,
                frame: 0,
                startTime: Date.now(),
                distance: 0,
                multiplier: 1,
                shieldActive: false,
                shieldTimer: 0,
                player: {
                    x: canvas.width / 2 - 25,
                    y: canvas.height - 120, // Car thodi upar tak touch pe ungli na chhupe
                    w: 50,
                    h: 70,
                    targetX: canvas.width / 2 - 25
                },
                obstacles: [],
                powerUps: [],
                particles: []
            };
        }

        // ===== DRAG AND INPUT SYSTEM (FIXED) =====
        function handleInput(clientX) {
            if (!gameState.game || !gameState.game.gameActive || gameState.game.isPaused) return;
            // Car position update based on drag
            let newTargetX = clientX - gameState.game.player.w / 2;
            // Boundaries check
            gameState.game.player.targetX = Math.max(0, Math.min(newTargetX, canvas.width - gameState.game.player.w));
        }

        canvas.addEventListener('mousedown', (e) => { gameState.isDragging = true; handleInput(e.clientX); });
        window.addEventListener('mousemove', (e) => { if (gameState.isDragging) handleInput(e.clientX); });
        window.addEventListener('mouseup', () => { gameState.isDragging = false; });

        // Touch support
        canvas.addEventListener('touchstart', (e) => { 
            gameState.isDragging = true; 
            handleInput(e.touches[0].clientX); 
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { 
            if (gameState.isDragging) handleInput(e.touches[0].clientX); 
        }, { passive: false });
        canvas.addEventListener('touchend', () => { gameState.isDragging = false; });

        // Audio System (Sahi kiya gaya Frequency filter)
        let audioCtx;
        function playSound(freq, duration) {
            if (!gameState.game || !gameState.game.soundEnabled) return;
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // Baki Game Logic (Obstacles, Particles, Draw, Update) bilkul wahi hai jo aapne manga tha
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.life = 40;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life--; }
            draw() { ctx.fillStyle = this.color; ctx.globalAlpha = this.life / 40; ctx.fillRect(this.x, this.y, 6, 6); ctx.globalAlpha = 1; }
        }

        function createObstacle() {
            const g = gameState.game;
            if (g.obstacles.length > 15) return;
            const lanes = [canvas.width * 0.1, canvas.width * 0.35, canvas.width * 0.6, canvas.width * 0.85];
            g.obstacles.push({
                x: lanes[Math.floor(Math.random() * lanes.length)],
                y: -100, w: 45, h: 90, color: '#ff00ff'
            });
        }

        function createPowerUp(x, y) {
            const g = gameState.game;
            const types = ['shield', 'speed', 'multiplier'];
            g.powerUps.push({ x: x, y: y, w: 40, h: 40, type: types[Math.floor(Math.random() * types.length)], rotation: 0 });
        }

        function update() {
            const g = gameState.game;
            if (!g.gameActive || g.isPaused) return;

            // Smooth Interpolation for Drag
            g.player.x += (g.player.targetX - g.player.x) * 0.25;
            if (g.shieldTimer > 0) g.shieldTimer--;
            g.distance += g.speed * 0.001;

            for (let i = g.obstacles.length - 1; i >= 0; i--) {
                g.obstacles[i].y += g.speed;
                if (g.player.x < g.obstacles[i].x + g.obstacles[i].w &&
                    g.player.x + g.player.w > g.obstacles[i].x &&
                    g.player.y < g.obstacles[i].y + g.obstacles[i].h &&
                    g.player.y + g.player.h > g.obstacles[i].y) {
                    
                    if (g.shieldActive && g.shieldTimer > 0) {
                        g.shieldActive = false; g.shieldTimer = 0;
                        playSound(900, 0.2); g.obstacles.splice(i, 1);
                    } else {
                        g.gameActive = false; playSound(150, 0.8); endGame(); return;
                    }
                } else if (g.obstacles[i].y > canvas.height) {
                    g.obstacles.splice(i, 1);
                    g.score += Math.floor(25 * g.multiplier * g.difficulty.scoreMult);
                    g.combo++;
                    g.speed += 0.05;
                    if (Math.random() < 0.15) createPowerUp(Math.random()*canvas.width, -50);
                }
            }

            for (let i = g.powerUps.length - 1; i >= 0; i--) {
                g.powerUps[i].y += g.speed * 0.8;
                if (g.player.x < g.powerUps[i].x + g.powerUps[i].w &&
                    g.player.x + g.player.w > g.powerUps[i].x &&
                    g.player.y < g.powerUps[i].y + g.powerUps[i].h &&
                    g.player.y + g.player.h > g.powerUps[i].y) {
                    const type = g.powerUps[i].type;
                    if (type === 'shield') { g.shieldActive = true; g.shieldTimer = 400; }
                    else if (type === 'speed') { g.speed += 1.5; }
                    else if (type === 'multiplier') { g.multiplier += 0.5; }
                    playSound(1600, 0.2);
                    g.powerUps.splice(i, 1);
                }
            }

            if (g.frame % g.difficulty.spawnRate === 0) createObstacle();
            g.level = Math.floor(g.score / 500) + 1;
            g.frame++;
        }

        function endGame() {
            const g = gameState.game;
            document.getElementById('finalScore').textContent = g.score;
            document.getElementById('finalLevel').textContent = g.level;
            document.getElementById('finalTime').textContent = ((Date.now() - g.startTime)/1000).toFixed(1) + 's';
            document.getElementById('finalCombo').textContent = g.combo;
            document.getElementById('finalDist').textContent = g.distance.toFixed(1);
            document.getElementById('game-over-modal').style.display = 'flex';
            gameState.isRunning = false;
        }

        function draw() {
            const g = gameState.game;
            ctx.fillStyle = '#050005';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.1)';
            const offset = (g.frame * 5) % 50;
            for (let i = -offset; i < canvas.height; i += 50) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Player
            ctx.shadowBlur = 20; ctx.shadowColor = g.car.color;
            ctx.fillStyle = g.car.color;
            ctx.fillRect(g.player.x, g.player.y, g.player.w, g.player.h);
            
            if (g.shieldActive) {
                ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 3;
                ctx.strokeRect(g.player.x-5, g.player.y-5, g.player.w+10, g.player.h+10);
            }

            // Obstacles
            ctx.shadowColor = '#ff00ff';
            g.obstacles.forEach(o => {
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(o.x, o.y, o.w, o.h);
            });

            // Powerups
            g.powerUps.forEach(p => {
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(p.x, p.y, p.w, p.h);
            });

            ctx.shadowBlur = 0;
            document.getElementById('score-display').textContent = g.score;
        }

        function gameLoop() {
            if (gameState.isRunning) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }

        document.getElementById('pauseBtn').addEventListener('click', function() {
            if (!gameState.game) return;
            gameState.game.isPaused = !gameState.game.isPaused;
            this.textContent = gameState.game.isPaused ? '▶' : '⏸';
        });

        initMenu();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
