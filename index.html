    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        #loader {
            position: fixed; inset: 0; background: var(--dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .pro-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 20px; margin-bottom: 15px;
            transition: 0.3s transform;
        }
        .pro-card:hover { transform: translateY(-3px); }

        /* Calculator Styles */
        .c-screen {
            background: #000; border: 1px solid var(--primary);
            color: var(--primary); font-size: 2.5rem; text-align: right;
            padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 15px;
        }
        .btn-elite {
            height: 65px; border-radius: 15px; border: none;
            background: #1e293b; color: white; font-weight: 600; font-size: 1.2rem;
        }
        .btn-op { background: #6366f1; }
        .btn-equal { background: linear-gradient(to right, var(--primary), var(--secondary)); color: #000; }

        /* Navigation Dock */
        .nav-dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px); border-radius: 30px;
            display: flex; justify-content: space-around; padding: 10px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .nav-link {
            color: #94a3b8; border: none; background: none; font-size: 0.7rem;
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
        }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 1.5rem; margin-bottom: 2px; }

        .page { display: none; animation: slideUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Game Board */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: auto; }
        .cell {
            background: var(--glass); aspect-ratio: 1; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Sidebar */
        .sp-sidebar {
            position: fixed; right: -300px; top: 0; width: 280px; height: 100vh;
            background: rgba(10, 10, 20, 0.95); backdrop-filter: blur(20px);
            z-index: 10000; padding: 30px 20px; transition: 0.4s;
        }
        .sp-sidebar.active { right: 0; }
        #sidebar-toggle-btn {
            position: fixed; bottom: 100px; right: 20px; width: 55px; height: 55px;
            border-radius: 50%; background: var(--primary); border: none; z-index: 999;
        }
    </style>
</head>
<body onload="init()">

<div id="loader">
    <div class="spinner-grow text-info mb-3"></div>
    <h4 class="text-info">SINGHPRIYA OS</h4>
</div>

<div class="container pt-4">
    <div id="p-home" class="page active">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3><i class="fas fa-bolt text-warning"></i> Infinity Suite</h3>
            <div class="pro-card p-2 px-3 m-0 rounded-pill">
                <span id="batt-text">100%</span> <span id="batt-ico">🔋</span>
            </div>
        </div>
        
        <div class="pro-card text-center py-5">
            <h1 id="clock" class="display-3 fw-bold mb-0">00:00:00</h1>
            <p id="full-date" class="text-info"></p>
        </div>

        <div class="row g-3">
            <div class="col-6">
                <div class="pro-card text-center" onclick="toggleFlash()">
                    <i id="torch-ico" class="fas fa-lightbulb fa-3x mb-2"></i><br>Flashlight
                </div>
            </div>
            <div class="col-6">
                <div class="pro-card text-center">
                    <i class="fas fa-cloud-sun fa-3x mb-2 text-warning"></i><br>Weather
                </div>
            </div>
        </div>
    </div>

    <div id="p-calc" class="page">
        <h4 class="mb-3">Calculator</h4>
        <div class="pro-card">
            <input type="text" id="calc-screen" class="c-screen" readonly value="">
            <div class="row g-2">
                <div class="col-3"><button class="btn-elite btn-op w-100" onclick="cClear()">C</button></div>
                <div class="col-3"><button class="btn-elite btn-op w-100" onclick="cIn('(')">(</button></div>
                <div class="col-3"><button class="btn-elite btn-op w-100" onclick="cIn(')')">)</button></div>
                <div class="col-3"><button class="btn-elite btn-op w-100" onclick="cIn('/')">/</button></div>
                <div class="col-3"><button class="btn-elite w-100" onclick="cIn('7')">7</button></div>
                <div class="col-3"><button class="btn-elite w-100" onclick="cIn('8')">8</button></div>
                <div class="col-3"><button class="btn-elite w-100" onclick="cIn('9')">9</button></div>
                <div class="col-3"><button class="btn-elite btn-op w-100" onclick="cIn('*')">×</button></div>
                <div class="col-3"><button class="btn-elite w-100" onclick="cIn('4')">4</button></div>
                <div class="col-3"><button class="btn-elite w-100" onclick="cIn('5')">5</button></div>
                <div class="col-3"><button class="btn-elite w-100" onclick="cIn('6')">6</button></div>
                <div class="col-3"><button class="btn-elite btn-op w-100" onclick="cIn('-')">-</button></div>
                <div class="col-6"><button class="btn-elite w-100" onclick="cIn('0')">0</button></div>
                <div class="col-3"><button class="btn-elite w-100" onclick="cIn('.')">.</button></div>
                <div class="col-3"><button class="btn-elite btn-equal w-100" onclick="cSolve()">=</button></div>
            </div>
        </div>
    </div>

    <div id="p-tools" class="page">
        <div class="pro-card">
            <h5>Currency Converter</h5>
            <input type="number" id="amt" class="form-control mb-2" value="1">
            <select id="cur" class="form-select mb-3">
                <option value="83.15">USD to INR</option>
                <option value="90.50">EUR to INR</option>
            </select>
            <button class="btn btn-info w-100" onclick="convert()">Convert</button>
            <h3 id="res" class="mt-3 text-center">₹ 83.15</h3>
        </div>
        <div class="pro-card text-center">
            <h5>Stopwatch</h5>
            <h2 id="sw" class="display-4">00:00.0</h2>
            <div class="btn-group w-100">
                <button class="btn btn-success" onclick="swStart()">Start</button>
                <button class="btn btn-danger" onclick="swStop()">Stop</button>
                <button class="btn btn-secondary" onclick="swReset()">Reset</button>
            </div>
        </div>
    </div>

    <div id="p-notes" class="page">
        <div class="pro-card">
            <h5>Notes</h5>
            <textarea id="noteInp" class="form-control mb-2" placeholder="Write something..."></textarea>
            <button class="btn btn-primary w-100" onclick="addNote()">Save Note</button>
            <div id="notesList" class="mt-3"></div>
        </div>
    </div>

    <div id="p-game" class="page">
        <div class="pro-card text-center">
            <h5 id="game-status">Tic-Tac-Toe</h5>
            <div class="board" id="board">
                <div class="cell" onclick="makeMove(0)"></div>
                <div class="cell" onclick="makeMove(1)"></div>
                <div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div>
                <div class="cell" onclick="makeMove(4)"></div>
                <div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div>
                <div class="cell" onclick="makeMove(7)"></div>
                <div class="cell" onclick="makeMove(8)"></div>
            </div>
            <button class="btn btn-outline-light mt-3" onclick="resetGame()">Reset Game</button>
        </div>
    </div>
</div>

<div class="nav-dock">
    <button class="nav-link active" onclick="showPage('home', this)"><i class="fas fa-home"></i>Home</button>
    <button class="nav-link" onclick="showPage('calc', this)"><i class="fas fa-calculator"></i>Calc</button>
    <button class="nav-link" onclick="showPage('tools', this)"><i class="fas fa-toolbox"></i>Tools</button>
    <button class="nav-link" onclick="showPage('notes', this)"><i class="fas fa-edit"></i>Notes</button>
    <button class="nav-link" onclick="showPage('game', this)"><i class="fas fa-gamepad"></i>Game</button>
</div>

<button id="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

<div class="sp-sidebar" id="sp-sidebar">
    <h4>Settings</h4>
    <hr>
    <button class="btn btn-dark w-100 mb-2" onclick="location.reload()">Refresh OS</button>
    <button class="btn btn-danger w-100" onclick="toggleSidebar()">Close</button>
</div>

<script>
    // System Initialization
    function init() {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        }, 1000);
        updateClock();
        loadNotes();
        updateBattery();
    }

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(window.navigator.vibrate) window.navigator.vibrate(10);
    }

    // Clock Logic
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour12: false});
        document.getElementById('full-date').innerText = now.toDateString();
        setTimeout(updateClock, 1000);
    }

    // Battery Logic
    async function updateBattery() {
        if(navigator.getBattery) {
            const batt = await navigator.getBattery();
            const update = () => {
                document.getElementById('batt-text').innerText = Math.round(batt.level * 100) + '%';
            };
            batt.addEventListener('levelchange', update);
            update();
        }
    }

    // Calculator Logic
    const sc = document.getElementById('calc-screen');
    function cIn(v) { sc.value += v; }
    function cClear() { sc.value = ''; }
    function cSolve() {
        try { sc.value = eval(sc.value) || ''; } catch { sc.value = 'Error'; }
    }

    // Flashlight Simulation
    let flash = false;
    function toggleFlash() {
        flash = !flash;
        document.getElementById('torch-ico').className = flash ? "fas fa-lightbulb fa-3x text-warning" : "fas fa-lightbulb fa-3x";
        document.body.style.filter = flash ? "brightness(1.2)" : "none";
    }

    // Notes Logic (Local Storage)
    function addNote() {
        const txt = document.getElementById('noteInp').value;
        if(!txt) return;
        let notes = JSON.parse(localStorage.getItem('my_notes') || '[]');
        notes.push(txt);
        localStorage.setItem('my_notes', JSON.stringify(notes));
        document.getElementById('noteInp').value = '';
        loadNotes();
    }
    function loadNotes() {
        const list = document.getElementById('notesList');
        const notes = JSON.parse(localStorage.getItem('my_notes') || '[]');
        list.innerHTML = notes.map((n, i) => `
            <div class="pro-card d-flex justify-content-between">
                <span>${n}</span>
                <i class="fas fa-trash text-danger" onclick="delNote(${i})"></i>
            </div>
        `).join('');
    }
    function delNote(i) {
        let notes = JSON.parse(localStorage.getItem('my_notes'));
        notes.splice(i, 1);
        localStorage.setItem('my_notes', JSON.stringify(notes));
        loadNotes();
    }

    // Tic-Tac-Toe Logic
    let board = ["","","","","","","","",""];
    function makeMove(i) {
        if(board[i] === "") {
            board[i] = "X";
            renderBoard();
            if(!checkWin()) setTimeout(aiMove, 500);
        }
    }
    function aiMove() {
        let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
        if(empty.length > 0) {
            board[empty[Math.floor(Math.random()*empty.length)]] = "O";
            renderBoard();
            checkWin();
        }
    }
    function renderBoard() {
        const cells = document.querySelectorAll('.cell');
        board.forEach((v, i) => cells[i].innerText = v);
    }
    function checkWin() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let s of wins) {
            if(board[s[0]] && board[s[0]] === board[s[1]] && board[s[0]] === board[s[2]]) {
                alert(board[s[0]] + " Wins!");
                resetGame();
                return true;
            }
        }
        return false;
    }
    function resetGame() { board = board.fill(""); renderBoard(); }

    // Sidebar
    function toggleSidebar() { document.getElementById('sp-sidebar').classList.toggle('active'); }

    // Stopwatch Logic
    let startTime, timer;
    function swStart() { 
        startTime = Date.now(); 
        timer = setInterval(() => {
            let diff = new Date(Date.now() - startTime);
            document.getElementById('sw').innerText = diff.toISOString().substr(14, 7);
        }, 100);
    }
    function swStop() { clearInterval(timer); }
    function swReset() { clearInterval(timer); document.getElementById('sw').innerText = "00:00.0"; }
</script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/Calculator-/service-worker.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.error('Service Worker not registered', err));
    });
  }
    </script>
    
</body>
