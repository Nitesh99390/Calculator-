    <style>
        /* Root variables (same as before) */
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-start: #ee7752;
            --bg-mid: #e73c7e;
            --bg-end: #23a6d5;
            --bg-last: #23d5ab;
            --glass: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(0, 0, 0, 0.4);
            --text-color: #fff;
            --dock-bg: rgba(15, 23, 42, 0.9);
            --nav-inactive: #94a3b8;
            --icon-shape: 28px;
            --custom-bg: none;
            --terminal-bg: #0a0e1c;
        }
        body.light-mode {
            --bg-start: #f5f7fa;
            --bg-mid: #c3cfe2;
            --bg-end: #e0eafc;
            --bg-last: #cfd9df;
            --glass: rgba(0, 0, 0, 0.05);
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-color: #0f172a;
            --dock-bg: rgba(255, 255, 255, 0.8);
            --nav-inactive: #334155;
        }
        body.cyberpunk-theme {
            --primary: #ff00c1;
            --secondary: #9600ff;
            --bg-start: #00f2fe;
            --bg-mid: #4facfe;
            --bg-end: #00f2fe;
            --bg-last: #4facfe;
            --card-bg: rgba(0, 255, 255, 0.2);
            --dock-bg: rgba(0, 0, 0, 0.8);
        }
        body.amoled-theme {
            --bg-start: #000;
            --bg-mid: #000;
            --bg-end: #000;
            --bg-last: #000;
            --card-bg: #111;
            --text-color: #0f0;
            --dock-bg: #000;
            --primary: #0f0;
        }
        body.retro-theme {
            --bg-start: #f0e68c;
            --bg-mid: #bdb76b;
            --bg-end: #8fbc8f;
            --bg-last: #2e8b57;
            --card-bg: #ffe4c4;
            --text-color: #4b2e2e;
            --primary: #8b4513;
        }
        body {
            background: var(--custom-bg) no-repeat center center fixed, linear-gradient(-45deg, var(--bg-start), var(--bg-mid), var(--bg-end), var(--bg-last));
            background-size: cover, 400% 400%;
            animation: gradient 15s ease infinite;
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.2s;
            will-change: background, color;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        /* Desktop area */
        #desktop {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 80px;
            overflow: auto;
            padding: 20px;
            z-index: 1;
        }
        /* Windows container */
        #windows-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        /* Window styling */
        .os-window {
            position: absolute;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            min-width: 250px;
            min-height: 200px;
            z-index: 100;
            transition: box-shadow 0.2s;
        }
        .os-window:active {
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .window-header {
            background: rgba(0,0,0,0.5);
            border-radius: 16px 16px 0 0;
            padding: 10px 12px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .window-title {
            font-weight: bold;
            font-size: 1rem;
        }
        .window-controls {
            display: flex;
            gap: 8px;
        }
        .window-controls span {
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .window-controls span:hover {
            background: rgba(255,255,255,0.4);
        }
        .window-content {
            flex: 1;
            padding: 15px;
            overflow: auto;
            border-radius: 0 0 16px 16px;
        }
        /* Resize handle */
        .resize-handle {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 15px;
            height: 15px;
            cursor: se-resize;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        /* Dock */
        .nav-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 800px;
            background: var(--dock-bg);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            padding: 10px 5px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 2000;
        }
        .dock-item {
            color: var(--nav-inactive);
            background: none;
            font-size: 0.6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            flex:1;
            cursor: pointer;
            transition: 0.2s;
        }
        .dock-item.active {
            color: var(--primary);
        }
        .dock-item i {
            font-size: 1.3rem;
            margin-bottom: 2px;
        }

        /* Sidebar and other components (unchanged but repositioned) */
        .sp-sidebar {
            position: fixed;
            right: -320px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            z-index: 10000;
            padding: 30px 20px;
            transition: 0.4s;
            border-left: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            will-change: right;
        }
        .sp-sidebar.active { right: 0; }
        #sidebar-toggle-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            background: var(--primary);
            border: none;
            z-index: 999;
        }
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 11000;
            max-width: 300px;
        }
        .notification-toast {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 12px 20px;
            margin-bottom: 10px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        /* Desktop widgets */
        .desktop-clock {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            display: inline-block;
            margin-bottom: 20px;
        }
        .desktop-shortcuts {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .shortcut {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            width: 100px;
        }
        /* Games */
        .snake-canvas {
            background: #111;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

    <script>
        // Main OS object with window manager
        const OS = {
            windows: {},
            nextWindowId: 1,
            db: null,
            groqApiKey: localStorage.getItem('groqKey') || '',
            weatherApiKey: localStorage.getItem('weatherKey') || '',
            currentDesktop: null,

            init: async function() {
                // IndexedDB
                this.db = new Dexie('SinghPriyaOS');
                this.db.version(1).stores({
                    files: 'name, content, modified',
                    notes: '++id, title, content, timestamp',
                    chats: '++id, role, content, timestamp'
                });
                await this.db.open();

                // Load saved API keys
                if (this.groqApiKey) document.getElementById('groq-key').value = this.groqApiKey;
                if (this.weatherApiKey) document.getElementById('weather-key').value = this.weatherApiKey;

                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                this.initBattery();
                this.updateStorage();
                setInterval(() => this.updateStorage(), 30000);
                this.loadFileList();
                this.renderDock();
                this.updateSystemMonitor();
                setInterval(() => this.updateSystemMonitor(), 5000);

                // Setup theme, wallpaper, etc.
                let theme = localStorage.getItem('theme') || 'default';
                this.setTheme(theme);
                if (localStorage.getItem('iconShape') === 'square') document.body.classList.add('square-icons');
                let savedWallpaper = localStorage.getItem('customWallpaper');
                if (savedWallpaper) document.body.style.setProperty('--custom-bg', `url('${savedWallpaper}')`);

                // Show onboarding if first time
                if (!localStorage.getItem('onboarded')) {
                    setTimeout(() => {
                        alert('Welcome to SinghPriya OS 2026 Ultimate! Drag windows, open apps, and enjoy.');
                        localStorage.setItem('onboarded', 'true');
                    }, 1000);
                }
            },

            // Clock
            updateClock: function() {
                let now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString();
                document.getElementById('full-date').innerText = now.toLocaleDateString('hi-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
            },

            // Window Manager
            createWindow: function(id, title, contentHtml, width=400, height=300, x=100, y=100) {
                if (this.windows[id]) return;
                const winDiv = document.createElement('div');
                winDiv.className = 'os-window';
                winDiv.id = `win-${id}`;
                winDiv.style.width = `${width}px`;
                winDiv.style.height = `${height}px`;
                winDiv.style.left = `${x}px`;
                winDiv.style.top = `${y}px`;
                winDiv.style.zIndex = 100 + Object.keys(this.windows).length;

                winDiv.innerHTML = `
                    <div class="window-header">
                        <span class="window-title">${title}</span>
                        <div class="window-controls">
                            <span onclick="OS.closeWindow('${id}')">✖</span>
                        </div>
                    </div>
                    <div class="window-content">${contentHtml}</div>
                    <div class="resize-handle"></div>
                `;
                document.getElementById('windows-container').appendChild(winDiv);
                this.windows[id] = { element: winDiv, title, content: contentHtml };

                // Make draggable and resizable with interact.js
                interact(`#win-${id}`).draggable({
                    inertia: true,
                    modifiers: [
                        interact.modifiers.restrictRect({
                            restriction: 'parent',
                            endOnly: true
                        })
                    ],
                    onmove: (event) => {
                        const target = event.target;
                        const x = (parseFloat(target.style.left) || 0) + event.dx;
                        const y = (parseFloat(target.style.top) || 0) + event.dy;
                        target.style.left = `${x}px`;
                        target.style.top = `${y}px`;
                    }
                }).resizable({
                    edges: { bottom: true, right: true },
                    modifiers: [
                        interact.modifiers.restrictSize({
                            min: { width: 200, height: 150 }
                        })
                    ],
                    onmove: (event) => {
                        const target = event.target;
                        let width = event.rect.width;
                        let height = event.rect.height;
                        target.style.width = `${width}px`;
                        target.style.height = `${height}px`;
                    }
                });

                // Bring to front on click
                winDiv.addEventListener('mousedown', () => this.focusWindow(id));
                return winDiv;
            },

            focusWindow: function(id) {
                let maxZ = 100;
                for (let w in this.windows) {
                    let z = parseInt(this.windows[w].element.style.zIndex) || 100;
                    if (z > maxZ) maxZ = z;
                }
                this.windows[id].element.style.zIndex = maxZ + 1;
            },

            closeWindow: function(id) {
                if (this.windows[id]) {
                    this.windows[id].element.remove();
                    delete this.windows[id];
                }
            },

            // Open an app in a new window
            openApp: function(appId) {
                let content = '';
                let title = '';
                let width = 500, height = 400;
                switch(appId) {
                    case 'calc':
                        title = 'Scientific Calculator';
                        content = this.getCalculatorHTML();
                        break;
                    case 'draw':
                        title = 'Drawing Pad';
                        content = this.getDrawingHTML();
                        break;
                    case 'notes':
                        title = 'Notes';
                        content = this.getNotesHTML();
                        break;
                    case 'terminal':
                        title = 'Terminal';
                        content = this.getTerminalHTML();
                        break;
                    case 'weather':
                        title = 'Weather';
                        content = this.getWeatherHTML();
                        break;
                    case 'music':
                        title = 'Music Player';
                        content = this.getMusicHTML();
                        break;
                    case 'code':
                        title = 'Code Editor';
                        content = this.getCodeEditorHTML();
                        width = 700; height = 500;
                        break;
                    case 'snake':
                        title = 'Snake Game';
                        content = this.getSnakeHTML();
                        break;
                    case 'markdown':
                        title = 'Markdown Editor';
                        content = this.getMarkdownHTML();
                        break;
                    case 'ai':
                        title = 'AI Assistant';
                        content = this.getAIHTML();
                        width = 500; height = 450;
                        break;
                    default:
                        return;
                }
                const winId = `win_${appId}_${Date.now()}`;
                const win = this.createWindow(winId, title, content, width, height, 100 + Math.random() * 100, 100 + Math.random() * 100);
                // Special initializers for apps that need JS after DOM load
                setTimeout(() => {
                    if (appId === 'draw') this.initDrawingPadInWindow(winId);
                    if (appId === 'code') this.initCodeEditor(winId);
                    if (appId === 'snake') this.initSnake(winId);
                    if (appId === 'terminal') this.initTerminal(winId);
                    if (appId === 'weather') this.fetchWeather(winId);
                }, 50);
            },

            // HTML generators for each app (simplified versions, but functional)
            getCalculatorHTML: () => `
                <input type="text" id="calc-screen" class="c-screen" readonly>
                <div class="row g-2">
                    <div class="col-3"><button class="btn-elite btn-func w-100" onclick="OS.cFunc('sqrt', this)">√</button></div>
                    <div class="col-3"><button class="btn-elite btn-func w-100" onclick="OS.cFunc('square', this)">x²</button></div>
                    <div class="col-3"><button class="btn-elite btn-func w-100" onclick="OS.cFunc('%', this)">%</button></div>
                    <div class="col-3"><button class="btn-elite btn-func w-100" onclick="OS.cFunc('±', this)">±</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('7', this)">7</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('8', this)">8</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('9', this)">9</button></div>
                    <div class="col-3"><button class="btn-elite btn-op w-100" onclick="OS.cIn('/', this)">÷</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('4', this)">4</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('5', this)">5</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('6', this)">6</button></div>
                    <div class="col-3"><button class="btn-elite btn-op w-100" onclick="OS.cIn('*', this)">×</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('1', this)">1</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('2', this)">2</button></div>
                    <div class="col-3"><button class="btn-elite w-100" onclick="OS.cIn('3', this)">3</button></div>
                    <div class="col-3"><button class="btn-elite btn-op w-100" onclick="OS.cIn('-', this)">-</button></div>

                    <div class="col-12"><button class="btn-elite w-100" onclick="OS.cClear(this)">C</button></div>
                </div>
            `,
            getDrawingHTML: () => `<canvas id="drawing-canvas" width="400" height="300" style="background:white; border-radius:12px; width:100%; height:auto;"></canvas><div class="mt-2"><input type="color" id="pen-color" value="#000000"><button class="btn btn-warning ms-2" onclick="OS.clearPadInWindow(this)">Clear</button></div>`,
            getNotesHTML: () => `<textarea id="notes-text" class="form-control" rows="10" placeholder="Write your notes..."></textarea><button class="btn btn-primary mt-2" onclick="OS.saveNotes()">Save</button><div id="saved-notes"></div>`,
            getTerminalHTML: () => `<div id="term-output" style="background:#000; color:#0f0; height:200px; overflow-y:auto; padding:5px; font-family:monospace;"></div><div class="input-group mt-2"><span class="input-group-text">$</span><input type="text" id="term-input" class="form-control" placeholder="Type command..."><button class="btn btn-primary" onclick="OS.runTerminalCommand(this)">Run</button></div>`,
            getWeatherHTML: () => `<div id="weather-info">Loading weather...</div>`,
            getMusicHTML: () => `<input type="file" id="music-file" accept="audio/*" class="form-control mb-2"><audio id="audio-player" controls style="width:100%"></audio><div class="mt-2"><button class="btn btn-primary" onclick="OS.playMusic()">Play</button></div>`,
            getCodeEditorHTML: () => `<textarea id="code-editor" class="form-control" rows="15"></textarea><div class="mt-2"><button class="btn btn-primary" onclick="OS.runCode()">Run</button></div>`,
            getSnakeHTML: () => `<canvas id="snake-canvas" width="400" height="400" class="snake-canvas"></canvas><div><span id="snake-score">0</span></div>`,
            getMarkdownHTML: () => `<textarea id="md-input" class="form-control" rows="10"></textarea><button class="btn btn-primary mt-2" onclick="OS.renderMarkdown()">Preview</button><div id="md-preview" class="mt-3"></div>`,
            getAIHTML: () => `<div id="ai-chat" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px;"><div class="chat-bubble ai">Hello! How can I help?</div></div><div class="input-group"><input type="text" id="ai-input" class="form-control" placeholder="Ask me..."><button class="btn btn-primary" onclick="OS.sendAIMessageWindow()">Send</button></div>`,

            // Calculator functions (adapted)
            cIn: function(val, btn) {
                let screen = btn.closest('.window-content').querySelector('#calc-screen');
                screen.value += val;
            },
            cClear: function(btn) {
                let screen = btn.closest('.window-content').querySelector('#calc-screen');
                screen.value = '';
            },
            cFunc: function(f, btn) {
                let screen = btn.closest('.window-content').querySelector('#calc-screen');
                if (f === 'sqrt') screen.value += 'sqrt(';
                else if (f === 'square') screen.value += '^2';
                else if (f === '%') {
                    try {
                        let result = math.evaluate(screen.value) / 100;
                        screen.value = result;
                    } catch(e) { screen.value = 'Error'; }
                } else if (f === '±') {
                    if (screen.value.startsWith('-')) screen.value = screen.value.substring(1);
                    else screen.value = '-' + screen.value;
                }
            },
            cSolve: function(btn) {
                let screen = btn.closest('.window-content').querySelector('#calc-screen');
                let expr = screen.value.replace(/×/g, '*').replace(/÷/g, '/');
                try {
                    let result = math.evaluate(expr);
                    screen.value = result;
                } catch(e) { screen.value = 'Error'; }
            },

            // Drawing Pad
            initDrawingPadInWindow: function(winId) {
                let canvas = document.querySelector(`#${winId} #drawing-canvas`);
                if (!canvas) return;
                let ctx = canvas.getContext('2d');
                let drawing = false;
                canvas.addEventListener('mousedown', start);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', () => drawing=false);
                canvas.addEventListener('mouseleave', () => drawing=false);
                function start(e) {
                    drawing = true;
                    ctx.beginPath();
                    let rect = canvas.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    let y = e.clientY - rect.top;
                    ctx.moveTo(x, y);
                }
                function draw(e) {
                    if (!drawing) return;
                    let rect = canvas.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    let y = e.clientY - rect.top;
                    ctx.lineTo(x, y);
                    ctx.strokeStyle = document.querySelector(`#${winId} #pen-color`).value;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            },
            clearPadInWindow: function(btn) {
                let canvas = btn.closest('.window-content').querySelector('#drawing-canvas');
                let ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            },

            // Terminal
            initTerminal: function(winId) {
                let output = document.querySelector(`#${winId} #term-output`);
                output.innerHTML = 'Welcome to SinghPriya OS Terminal. Type "help" for commands.\n';
            },
            runTerminalCommand: function(btn) {
                let winContent = btn.closest('.window-content');
                let input = winContent.querySelector('#term-input');
                let output = winContent.querySelector('#term-output');
                let cmd = input.value.trim();
                output.innerHTML += `$ ${cmd}\n`;
                if (cmd === 'help') output.innerHTML += 'Available: help, date, whoami, clear, open <app>\n';
                else if (cmd === 'date') output.innerHTML += new Date() + '\n';
                else if (cmd === 'whoami') output.innerHTML += 'user\n';
                else if (cmd.startsWith('open ')) {
                    let app = cmd.substring(5);
                    OS.openApp(app);
                    output.innerHTML += `Opening ${app}...\n`;
                } else if (cmd === 'clear') output.innerHTML = '';
                else output.innerHTML += 'Command not recognized\n';
                input.value = '';
                output.scrollTop = output.scrollHeight;
            },

            // Notes
            saveNotes: async function() {
                let content = document.querySelector('#notes-text').value;
                await this.db.notes.add({ title: 'Note ' + new Date(), content, timestamp: new Date().toISOString() });
                this.loadNotesList();
            },
            loadNotesList: async function() {
                let notes = await this.db.notes.toArray();
                let div = document.querySelector('#saved-notes');
                if (div) div.innerHTML = notes.map(n => `<div>${n.title} - ${n.timestamp} <button onclick="OS.loadNote(${n.id})">Load</button></div>`).join('');
            },
            loadNote: async function(id) {
                let note = await this.db.notes.get(id);
                if (note) document.querySelector('#notes-text').value = note.content;
            },

            // Weather
            fetchWeather: async function(winId) {
                let container = document.querySelector(`#${winId} #weather-info`);
                if (!this.weatherApiKey) {
                    container.innerHTML = 'Please enter OpenWeatherMap API key in Control Center.';
                    return;
                }
                try {
                    // Using geolocation to get city (mock city: Mumbai)
                    let city = 'Mumbai';
                    let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${this.weatherApiKey}&units=metric`;
                    let resp = await fetch(url);
                    let data = await resp.json();
                    container.innerHTML = `<h4>${data.name}</h4><p>${data.main.temp}°C, ${data.weather[0].description}</p>`;
                } catch(e) {
                    container.innerHTML = 'Error fetching weather.';
                }
            },

            // Music Player
            playMusic: function() {
                let file = document.querySelector('#music-file').files[0];
                if (file) {
                    let url = URL.createObjectURL(file);
                    let audio = document.querySelector('#audio-player');
                    audio.src = url;
                    audio.play();
                }
            },

            // Code Editor
            initCodeEditor: function(winId) {
                let textarea = document.querySelector(`#${winId} #code-editor`);
                if (!textarea) return;
                // Simple CodeMirror
                let editor = CodeMirror.fromTextArea(textarea, {
                    lineNumbers: true,
                    mode: 'javascript',
                    theme: 'material'
                });
                window.editorInstance = editor;
            },
            runCode: function() {
                let code = window.editorInstance.getValue();
                try {
                    let result = eval(code);
                    alert('Result: ' + result);
                } catch(e) {
                    alert('Error: ' + e.message);
                }
            },

            // Snake Game
            initSnake: function(winId) {
                const canvas = document.querySelector(`#${winId} #snake-canvas`);
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let snake = [{x:200, y:200}];
                let direction = 'RIGHT';
                let food = {x: Math.floor(Math.random()*20)*20, y: Math.floor(Math.random()*20)*20};
                let score = 0;
                let gameLoop;
                function draw() {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle = '#0f0';
                    snake.forEach(part => ctx.fillRect(part.x, part.y, 20, 20));
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(food.x, food.y, 20, 20);
                }
                function update() {
                    let head = {...snake[0]};
                    if (direction === 'RIGHT') head.x += 20;
                    if (direction === 'LEFT') head.x -= 20;
                    if (direction === 'UP') head.y -= 20;
                    if (direction === 'DOWN') head.y += 20;
                    if (head.x === food.x && head.y === food.y) {
                        score++;
                        document.querySelector(`#${winId} #snake-score`).innerText = score;
                        snake.unshift(head);
                        food = {x: Math.floor(Math.random()*20)*20, y: Math.floor(Math.random()*20)*20};
                    } else {
                        snake.unshift(head);
                        snake.pop();
                    }
                    if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.slice(1).some(part => part.x === head.x && part.y === head.y)) {
                        clearInterval(gameLoop);
                        alert('Game Over! Score: ' + score);
                        return;
                    }
                    draw();
                }
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight') direction = 'RIGHT';
                    if (e.key === 'ArrowLeft') direction = 'LEFT';
                    if (e.key === 'ArrowUp') direction = 'UP';
                    if (e.key === 'ArrowDown') direction = 'DOWN';
                });
                gameLoop = setInterval(update, 150);
            },

            // Markdown
            renderMarkdown: function() {
                let input = document.querySelector('#md-input').value;
                let html = marked.parse(input);
                document.querySelector('#md-preview').innerHTML = html;
            },

            // AI Assistant with function calling
            sendAIMessageWindow: async function() {
                let input = document.querySelector('#ai-input');
                let msg = input.value.trim();
                if (!msg) return;
                let chatDiv = document.querySelector('#ai-chat');
                chatDiv.innerHTML += `<div class="chat-bubble user">${msg}</div>`;
                input.value = '';
                chatDiv.innerHTML += `<div class="chat-bubble ai" id="ai-typing">Typing...</div>`;
                chatDiv.scrollTop = chatDiv.scrollHeight;

                if (!this.groqApiKey) {
                    setTimeout(() => {
                        document.getElementById('ai-typing')?.remove();
                        chatDiv.innerHTML += `<div class="chat-bubble ai">(Mock) Please add Groq API key in Control Center.</div>`;
                    }, 1000);
                    return;
                }

                try {
                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${this.groqApiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'mixtral-8x7b-32768',
                            messages: [{ role: 'user', content: msg }],
                            temperature: 0.7
                        })
                    });
                    const data = await response.json();
                    document.getElementById('ai-typing')?.remove();
                    let reply = data.choices[0].message.content;
                    // Simple function calling: if reply contains "CMD:", execute
                    if (reply.includes('CMD:')) {
                        let cmd = reply.split('CMD:')[1].split('\n')[0].trim();
                        this.executeCommand(cmd);
                        reply += '\n\n[Command executed: ' + cmd + ']';
                    }
                    chatDiv.innerHTML += `<div class="chat-bubble ai">${reply}</div>`;
                    // Speech synthesis
                    let utterance = new SpeechSynthesisUtterance(reply);
                    window.speechSynthesis.speak(utterance);
                } catch(e) {
                    document.getElementById('ai-typing')?.remove();
                    chatDiv.innerHTML += `<div class="chat-bubble ai">Error: ${e.message}</div>`;
                }
                chatDiv.scrollTop = chatDiv.scrollHeight;
            },

            executeCommand: function(cmd) {
                if (cmd === 'open calculator') this.openApp('calc');
                else if (cmd === 'open drawing') this.openApp('draw');
                else if (cmd === 'open terminal') this.openApp('terminal');
                else if (cmd === 'open music') this.openApp('music');
                else if (cmd === 'open snake') this.openApp('snake');
                else if (cmd === 'set theme light') this.setTheme('light');
                else if (cmd === 'set theme dark') this.setTheme('default');
                else if (cmd === 'close all windows') {
                    for (let id in this.windows) this.closeWindow(id);
                }
                else this.showNotification('Command', `Executed: ${cmd}`);
            },

            // Dock
            renderDock: function() {
                const dockApps = [
                    { id: 'calc', icon: 'fa-calculator', label: 'Calc' },
                    { id: 'draw', icon: 'fa-paint-brush', label: 'Draw' },
                    { id: 'notes', icon: 'fa-sticky-note', label: 'Notes' },
                    { id: 'terminal', icon: 'fa-terminal', label: 'Terminal' },
                    { id: 'weather', icon: 'fa-cloud-sun', label: 'Weather' },
                    { id: 'music', icon: 'fa-music', label: 'Music' },
                    { id: 'code', icon: 'fa-code', label: 'Code' },
                    { id: 'snake', icon: 'fa-gamepad', label: 'Snake' },
                    { id: 'ai', icon: 'fa-microchip', label: 'AI' }
                ];
                let dockDiv = document.getElementById('dock-container');
                dockDiv.innerHTML = '';
                dockApps.forEach(app => {
                    dockDiv.innerHTML += `<div class="dock-item" onclick="OS.openApp('${app.id}')"><i class="fas ${app.icon}"></i><span>${app.label}</span></div>`;
                });
            },

            // System helpers (mostly reused from previous)
            showNotification: function(title, msg) { /* ... same as before ... */ },
            setTheme: function(theme) { /* ... same ... */ },
            setCustomWallpaper: function() { /* ... */ },
            resetWallpaper: function() { /* ... */ },
            toggleIconShape: function() { /* ... */ },
            toggleSidebar: function() { document.getElementById('control-center').classList.toggle('active'); },
            saveApiKeys: function() {
                let groq = document.getElementById('groq-key').value;
                let weather = document.getElementById('weather-key').value;
                if (groq) { localStorage.setItem('groqKey', groq); this.groqApiKey = groq; }
                if (weather) { localStorage.setItem('weatherKey', weather); this.weatherApiKey = weather; }
                this.showNotification('API Keys', 'Saved.');
            },
            initBattery: function() { /* ... */ },
            updateStorage: function() { /* ... */ },
            updateSystemMonitor: function() { /* ... */ },
            loadFileList: async function() { /* ... */ },
            saveFile: async function() { /* ... */ },
            loadFile: async function() { /* ... */ },
            exportData: function() { /* ... */ },
            importData: function() { /* ... */ },
            togglePrivacyMode: function() { /* ... */ }
        };

        // Fill missing methods with minimal implementations to avoid errors
        OS.showNotification = function(title, msg) { alert(`${title}: ${msg}`); };
        OS.setTheme = function(theme) {
            document.body.classList.remove('light-mode','cyberpunk-theme','amoled-theme','retro-theme');
            if (theme === 'light') document.body.classList.add('light-mode');
            else if (theme === 'cyberpunk') document.body.classList.add('cyberpunk-theme');
            else if (theme === 'amoled') document.body.classList.add('amoled-theme');
            else if (theme === 'retro') document.body.classList.add('retro-theme');
            localStorage.setItem('theme', theme);
        };
        OS.setCustomWallpaper = function() {
            let file = document.getElementById('wallpaper-upload').files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (e) => {
                    document.body.style.setProperty('--custom-bg', `url('${e.target.result}')`);
                    localStorage.setItem('customWallpaper', e.target.result);
                };
                reader.readAsDataURL(file);
            }
        };
        OS.resetWallpaper = function() {
            document.body.style.setProperty('--custom-bg', 'none');
            localStorage.removeItem('customWallpaper');
        };
        OS.toggleIconShape = function() {
            document.body.classList.toggle('square-icons');
            let active = document.body.classList.contains('square-icons');
            document.getElementById('iconShapeToggle').classList.toggle('active', active);
            localStorage.setItem('iconShape', active ? 'square' : 'rounded');
        };
        OS.initBattery = function() {
            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    const update = () => {
                        document.getElementById('battery-level').innerText = Math.round(battery.level*100)+'%';
                        document.getElementById('battery-charging').innerText = battery.charging ? '(⚡)' : '';
                    };
                    update();
                    battery.addEventListener('levelchange', update);
                    battery.addEventListener('chargingchange', update);
                });
            }
        };
        OS.updateStorage = function() {
            if ('storage' in navigator && 'estimate' in navigator.storage) {
                navigator.storage.estimate().then(estimate => {
                    let usedMB = (estimate.usage / (1024*1024)).toFixed(1);
                    let totalMB = (estimate.quota / (1024*1024)).toFixed(1);
                    document.getElementById('storage-used').innerText = usedMB;
                    document.getElementById('storage-total').innerText = totalMB;
                });
            }
        };
        OS.updateSystemMonitor = function() {
            document.getElementById('cpu-usage').innerText = Math.floor(Math.random()*30+20);
            document.getElementById('memory-usage').innerText = Math.floor(Math.random()*200+100);
        };
        OS.loadFileList = async function() {
            let files = await OS.db.files.toArray();
            let listDiv = document.getElementById('file-list');
            if (files.length===0) listDiv.innerHTML='No files';
            else listDiv.innerHTML = files.map(f => `<div>${f.name} <button onclick="OS.deleteFile('${f.name}')">Del</button></div>`).join('');
        };
        OS.saveFile = async function() {
            let name = document.getElementById('filename').value.trim();
            let content = document.getElementById('filecontent').value;
            if (!name) return;
            await OS.db.files.put({ name, content, modified: new Date().toISOString() });
            OS.loadFileList();
            OS.showNotification('File saved', name);
        };
        OS.loadFile = async function() {
            let name = document.getElementById('filename').value.trim();
            if (!name) return;
            let file = await OS.db.files.get(name);
            if (file) document.getElementById('filecontent').value = file.content;
        };
        OS.deleteFile = async function(name) {
            await OS.db.files.delete(name);
            OS.loadFileList();
        };
        OS.exportData = function() {
            let data = {};
            for (let i=0;i<localStorage.length;i++) {
                let key = localStorage.key(i);
                data[key] = localStorage.getItem(key);
            }
            let blob = new Blob([JSON.stringify(data)], {type:'application/json'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'os-backup.json';
            a.click();
        };
        OS.importData = function() {
            let file = document.getElementById('import-file').files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = (e) => {
                let data = JSON.parse(e.target.result);
                for (let key in data) localStorage.setItem(key, data[key]);
                alert('Imported. Reloading...');
                location.reload();
            };
            reader.readAsText(file);
        };
        OS.togglePrivacyMode = function() {
            document.body.style.filter = document.body.style.filter ? '' : 'invert(1) hue-rotate(180deg)';
        };

        window.onload = () => OS.init();
    </script>
