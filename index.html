<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SinghPriya OS 2026 ULTIMATE - 3D Desktop</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.7.0/math.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.19/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --primary: #00f2fe;
            --secondary: #ff0088;
            --accent: #4facfe;
            --success: #00ff88;
            --danger: #ff5555;
            --dark: #0a0f2a;
            --darker: #050a15;
            --text: #f0f0f0;
            --muted: #a0a0b0;
            --border: rgba(255,255,255,0.1);
            --glass: rgba(20,25,45,0.8);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, var(--dark), var(--darker));
            color: var(--text);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* NAVBAR */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.3));
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--border);
            padding: 0 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
        }

        .navbar-title {
            color: var(--primary);
            font-weight: 900;
            font-size: 1.3rem;
            text-shadow: 0 0 20px var(--primary);
        }

        .navbar-center {
            display: flex;
            gap: 20px;
        }

        .navbar-center a {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(0,242,254,0.1);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            text-decoration: none;
        }

        .navbar-center a:hover {
            background: rgba(0,242,254,0.25);
            color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .navbar-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .time-display {
            background: rgba(0,242,254,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .install-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 25px;
            padding: 10px 25px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary);
            transition: all 0.3s;
        }

        .install-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px var(--primary);
        }

        /* DESKTOP */
        #desktop {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 90px;
            overflow: auto;
            padding: 30px;
            z-index: 1;
        }

        #windows-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* WINDOWS */
        .os-window {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 2px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            min-width: 300px;
            min-height: 250px;
            z-index: 100;
            transition: all 0.3s;
        }

        .os-window:hover {
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            border-color: rgba(0,242,254,0.3);
        }

        .os-window.maximized {
            width: calc(100vw - 60px) !important;
            height: calc(100vh - 170px) !important;
            top: 10px !important;
            left: 10px !important;
        }

        .window-header {
            background: linear-gradient(90deg, rgba(0,0,0,0.6), transparent);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .window-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }

        .window-icon {
            color: var(--primary);
            margin-right: 10px;
            text-shadow: 0 0 8px var(--primary);
        }

        .window-controls {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(255,80,80,0.9);
            border-color: rgba(255,80,80,0.9);
            box-shadow: 0 0 15px rgba(255,80,80,0.5);
        }

        .window-content {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }

        .window-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* DOCK */
        .nav-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1000px;
            background: rgba(10,15,30,0.9);
            backdrop-filter: blur(30px);
            border: 2px solid var(--border);
            border-radius: 80px;
            padding: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 2000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .dock-item {
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            color: var(--text);
        }

        .dock-item:hover {
            background: rgba(0,242,254,0.25);
            color: var(--primary);
            transform: translateY(-8px) scale(1.1);
            text-shadow: 0 0 15px var(--primary);
        }

        .dock-item i {
            font-size: 1.5rem;
            margin-bottom: 5px;
            display: block;
        }

        .dock-item span {
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* SIDEBAR */
        .sp-sidebar {
            position: fixed;
            right: -380px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(10,15,30,0.95);
            backdrop-filter: blur(30px);
            border-left: 2px solid var(--border);
            z-index: 10000;
            padding: 30px 20px;
            overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: -15px 0 40px rgba(0,0,0,0.6);
        }

        .sp-sidebar.active {
            right: 0;
        }

        .sp-sidebar h4 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--primary);
        }

        .sp-sidebar h6 {
            color: var(--primary);
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-card {
            background: rgba(0,242,254,0.08);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .sidebar-card:hover {
            background: rgba(0,242,254,0.15);
            border-color: var(--primary);
        }

        /* SIDEBAR TOGGLE */
        #sidebar-toggle-btn {
            position: fixed;
            bottom: 120px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: 2px solid white;
            cursor: pointer;
            z-index: 999;
            color: #000;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--primary);
            transition: all 0.3s;
        }

        #sidebar-toggle-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 40px var(--primary);
        }

        /* NOTIFICATIONS */
        #notification-container {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 11000;
            max-width: 350px;
        }

        .notification-toast {
            background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(0,50,80,0.5));
            backdrop-filter: blur(20px);
            border-left: 5px solid var(--primary);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 10px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* DESKTOP WIDGETS */
        .desktop-clock {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 25px 40px;
            text-align: center;
            display: inline-block;
            margin-bottom: 30px;
        }

        .desktop-clock h1 {
            color: var(--primary);
            font-size: 3rem;
            font-weight: 900;
            text-shadow: 0 0 20px var(--primary);
            margin-bottom: 10px;
        }

        .desktop-clock p {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .desktop-shortcuts {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .shortcut {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            width: 120px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .shortcut:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            background: rgba(0,242,254,0.15);
            box-shadow: 0 15px 40px rgba(0,242,254,0.25);
        }

        .shortcut i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--primary);
            transition: all 0.3s;
        }

        .shortcut:hover i {
            transform: scale(1.2);
            text-shadow: 0 0 20px var(--primary);
        }

        .shortcut span {
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* INPUTS & BUTTONS */
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 15px;
            color: var(--text);
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            background: rgba(0,242,254,0.1);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0,242,254,0.3);
        }

        .btn-3d {
            background: linear-gradient(145deg, #2c3e66, #1a2639);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 10px 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-3d:hover {
            background: linear-gradient(145deg, #3d4e77, #2b3649);
        }

        .btn-3d:active {
            transform: scale(0.95);
        }

        .c-screen {
            background: rgba(0,0,0,0.7);
            border: 2px solid var(--primary);
            border-radius: 12px;
            color: var(--primary);
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            padding: 15px;
            text-align: right;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--primary);
        }

        .terminal {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            border: 2px solid #0f0;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
            height: 250px;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(0,255,0,0.2);
        }

        /* GRID */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .stat-label {
            color: var(--muted);
        }

        .stat-value {
            color: var(--primary);
            font-weight: 700;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        @media (max-width: 768px) {
            .desktop-clock h1 { font-size: 2rem; }
            .shortcut { width: 100px; padding: 15px; }
            .sp-sidebar { width: 300px; }
        }
    </style>
</head>

    <script>
        // ===== MAIN OS CLASS =====
        class SinghPriyaOS {
            static instance = null;
            static getInstance() {
                if (!SinghPriyaOS.instance) SinghPriyaOS.instance = new SinghPriyaOS();
                return SinghPriyaOS.instance;
            }

            constructor() {
                this.windows = new Map();
                this.nextId = 1;
                this.db = null;
                this.graphics = null;
                this.pyodide = null;
                this.cpuChart = null;
                this.systemStats = { cpu: [], mem: 0, bat: 0, sto: 0 };
            }

            async init() {
                this.initDB();
                this.initGraphics();
                this.updateClock();
                this.renderDock();
                this.setupListeners();
                this.initSystemMonitor();
                this.loadPyodide();

                setInterval(() => this.updateClock(), 1000);
                setInterval(() => this.updateSystemStats(), 2000);

                document.getElementById('upload-file').addEventListener('change', (e) => {
                    this.uploadFiles(e.target.files);
                });

                if (!localStorage.getItem('onboarded')) {
                    this.showNotification('Welcome', '🎉 SinghPriya OS 2026 Ready!');
                    localStorage.setItem('onboarded', 'true');
                }
            }

            initDB() {
                this.db = new Dexie('SinghPriyaOS');
                this.db.version(1).stores({
                    files: '++id, name, modified',
                    notes: '++id, title, modified',
                    history: '++id, timestamp'
                });
                this.db.open();
            }

            initGraphics() {
                const container = document.getElementById('canvas-container');
                this.graphics = new GraphicsEngine(container);
            }

            async loadPyodide() {
                try {
                    this.pyodide = await loadPyodide();
                } catch (e) {
                    console.warn('Pyodide load failed:', e);
                }
            }

            updateClock() {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString();
                document.getElementById('navbar-time').textContent = now.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                document.getElementById('full-date').textContent = now.toLocaleDateString('en-US', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }

            updateSystemStats() {
                const cpu = Math.floor(Math.random() * 80 + 10);
                const mem = Math.floor(Math.random() * 70 + 20);
                const bat = Math.floor(Math.random() * 100);
                const sto = Math.floor(Math.random() * 60 + 20);

                document.getElementById('cpu-stat').textContent = cpu + '%';
                document.getElementById('mem-stat').textContent = mem + '%';
                document.getElementById('bat-stat').textContent = bat + '%';
                document.getElementById('sto-stat').textContent = sto + '%';

                this.systemStats.cpu.push(cpu);
                if (this.systemStats.cpu.length > 20) this.systemStats.cpu.shift();

                if (this.cpuChart) {
                    this.cpuChart.data.datasets[0].data = this.systemStats.cpu;
                    this.cpuChart.update('none');
                }
            }

            initSystemMonitor() {
                const canvas = document.createElement('canvas');
                canvas.id = 'cpu-chart';
                canvas.style.display = 'none';
                document.body.appendChild(canvas);

                const ctx = canvas.getContext('2d');
                this.cpuChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: Array(20).fill(''),
                        datasets: [{
                            label: 'CPU %',
                            data: Array(20).fill(0),
                            borderColor: '#00f2fe',
                            backgroundColor: 'rgba(0,242,254,0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: { responsive: true, scales: { y: { max: 100, min: 0 } } }
                });
            }

            renderDock() {
                const apps = ['calc', 'draw', 'terminal', 'python', 'notes', 'files', 'music', 'code', 'games', 'settings'];
                const icons = {
                    calc: 'calculator', draw: 'paint-brush', terminal: 'terminal',
                    python: 'python', notes: 'sticky-note', files: 'folder',
                    music: 'music', code: 'code', games: 'gamepad', settings: 'cog'
                };
                const dock = document.getElementById('dock-container');
                dock.innerHTML = apps.map(a => `
                    <div class="dock-item" onclick="OS.openApp('${a}')">
                        <i class="fas fa-${icons[a]}"></i>
                        <span>${a}</span>
                    </div>
                `).join('');
            }

            createWindow(id, title, icon, width = 500, height = 400) {
                const winDiv = document.createElement('div');
                winDiv.className = 'os-window';
                winDiv.id = `win-${id}`;
                winDiv.style.width = width + 'px';
                winDiv.style.height = height + 'px';
                winDiv.style.left = (100 + Math.random() * 100) + 'px';
                winDiv.style.top = (100 + Math.random() * 60) + 'px';

                winDiv.innerHTML = `
                    <div class="window-header">
                        <div><i class="fas fa-${icon} window-icon"></i><span class="window-title">${title}</span></div>
                        <div class="window-controls">
                            <button class="control-btn" onclick="OS.maximizeWindow('${id}')">🗖</button>
                            <button class="control-btn" onclick="OS.closeWindow('${id}')">✕</button>
                        </div>
                    </div>
                    <div class="window-content" id="content-${id}"></div>
                    <div class="window-footer">Ready</div>
                `;

                document.getElementById('windows-container').appendChild(winDiv);
                this.windows.set(id, { element: winDiv, content: winDiv.querySelector(`#content-${id}`) });

                interact(`#win-${id}`).draggable({
                    inertia: true,
                    onmove: (e) => {
                        winDiv.style.left = (parseFloat(winDiv.style.left) + e.dx) + 'px';
                        winDiv.style.top = (parseFloat(winDiv.style.top) + e.dy) + 'px';
                    }
                }).resizable({
                    edges: { right: true, bottom: true },
                    listeners: { move: (e) => {
                        winDiv.style.width = e.rect.width + 'px';
                        winDiv.style.height = e.rect.height + 'px';
                    }}
                });

                return this.windows.get(id);
            }

            openApp(app) {
                const id = `${app}_${this.nextId++}`;
                const configs = {
                    calc: { title: 'Calculator', icon: 'calculator', width: 400, height: 380 },
                    draw: { title: 'Drawing Pad', icon: 'paint-brush', width: 600, height: 500 },
                    terminal: { title: 'Terminal', icon: 'terminal', width: 650, height: 450 },
                    python: { title: 'Python REPL', icon: 'python', width: 600, height: 500 },
                    notes: { title: 'Notes', icon: 'sticky-note', width: 500, height: 400 },
                    files: { title: 'File Manager', icon: 'folder', width: 700, height: 500 },
                    music: { title: 'Music Player', icon: 'music', width: 600, height: 450 },
                    code: { title: 'Code Editor', icon: 'code', width: 800, height: 600 },
                    games: { title: 'Games', icon: 'gamepad', width: 600, height: 500 },
                    settings: { title: 'Settings', icon: 'cog', width: 600, height: 500 }
                };

                if (!configs[app]) return;
                const cfg = configs[app];
                const win = this.createWindow(id, cfg.title, cfg.icon, cfg.width, cfg.height);

                // App renderers
                if (app === 'calc') this.renderCalc(win.content);
                else if (app === 'draw') this.renderDraw(win.content);
                else if (app === 'terminal') this.renderTerminal(win.content);
                else if (app === 'python') this.renderPython(win.content);
                else if (app === 'notes') this.renderNotes(win.content);
                else if (app === 'files') this.renderFiles(win.content);
                else if (app === 'music') this.renderMusic(win.content);
                else if (app === 'code') this.renderCode(win.content);
                else if (app === 'games') this.renderGames(win.content);
                else if (app === 'settings') this.renderSettings(win.content);

                this.showNotification('App', `${cfg.title} opened`);
            }

            renderCalc(container) {
                const buttons = '789/456*123-0.+=C';
                let html = '<input class="c-screen" id="calc-display" readonly><div class="grid-layout" style="grid-template-columns: repeat(4, 1fr);">';
                for (const b of buttons) {
                    html += `<button class="btn-3d" onclick="
                        const scr = document.getElementById('calc-display');
                        if ('${b}' === 'C') scr.value = '';
                        else if ('${b}' === '=') {
                            try { scr.value = math.evaluate(scr.value); }
                            catch(e) { scr.value = 'Error'; }
                        }
                        else scr.value += '${b}';
                    ">${b}</button>`;
                }
                html += '</div>';
                container.innerHTML = html;
            }

            renderDraw(container) {
                container.innerHTML = `
                    <canvas id="draw-canvas" width="550" height="320" style="background:#1a1a1a; border-radius:12px; border:2px solid #00f2fe; cursor:crosshair; width:100%; max-height:320px;"></canvas>
                    <div style="margin-top:12px;">
                        <input type="color" id="pen-color" value="#00f2fe" style="width:50px; height:40px; border-radius:8px; border:none; cursor:pointer;">
                        <button class="btn-3d" onclick="document.getElementById('draw-canvas').getContext('2d').clearRect(0,0,550,320)">Clear</button>
                    </div>
                `;
                const canvas = container.querySelector('#draw-canvas');
                const ctx = canvas.getContext('2d');
                let drawing = false;

                canvas.addEventListener('mousedown', () => drawing = true);
                canvas.addEventListener('mouseup', () => drawing = false);
                canvas.addEventListener('mousemove', (e) => {
                    if (!drawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    ctx.strokeStyle = document.getElementById('pen-color').value;
                    ctx.lineWidth = 3;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                });
            }

            renderTerminal(container) {
                container.innerHTML = `
                    <div id="term-output" class="terminal"></div>
                    <div style="margin-top:12px; display:flex; gap:8px;">
                        <input id="term-input" class="form-control" placeholder="Command..." style="flex:1;">
                        <button class="btn-3d" onclick="OS.executeTerminalCmd()">Run</button>
                    </div>
                `;
                const output = container.querySelector('#term-output');
                output.innerHTML = 'SinghPriya Terminal v1.0\nType "help" for commands\n';
                window.executeTerminalCmd = () => {
                    const inp = container.querySelector('#term-input');
                    const cmd = inp.value.trim();
                    output.innerHTML += `\n$ ${cmd}\n`;
                    if (cmd === 'help') output.innerHTML += 'Commands: ls, echo, calc, clear, time\n';
                    else if (cmd === 'clear') output.innerHTML = '';
                    else if (cmd.startsWith('echo ')) output.innerHTML += cmd.substring(5) + '\n';
                    else if (cmd === 'time') output.innerHTML += new Date().toString() + '\n';
                    else if (cmd.startsWith('calc ')) {
                        try { output.innerHTML += math.evaluate(cmd.substring(5)) + '\n'; }
                        catch (e) { output.innerHTML += 'Error: ' + e.message + '\n'; }
                    }
                    else output.innerHTML += 'Unknown command\n';
                    inp.value = '';
                    output.scrollTop = output.scrollHeight;
                };
            }

            renderPython(container) {
                container.innerHTML = `
                    <div id="python-output" class="terminal"></div>
                    <div style="margin-top:12px; display:flex; gap:8px;">
                        <input id="python-input" class="form-control" placeholder="Python code..." style="flex:1;">
                        <button class="btn-3d" onclick="OS.executePythonCmd()">Run</button>
                    </div>
                `;
                const output = container.querySelector('#python-output');
                output.innerHTML = 'Python 3.11 Ready\n';
                window.executePythonCmd = async () => {
                    const inp = container.querySelector('#python-input');
                    const code = inp.value;
                    if (!this.pyodide) {
                        output.innerHTML += 'Python not loaded\n';
                        return;
                    }
                    try {
                        const result = await this.pyodide.runPythonAsync(code);
                        output.innerHTML += `>>> ${code}\n${result}\n`;
                    } catch (e) {
                        output.innerHTML += `Error: ${e}\n`;
                    }
                    inp.value = '';
                    output.scrollTop = output.scrollHeight;
                };
            }

            renderNotes(container) {
                container.innerHTML = `
                    <input id="note-title" class="form-control" placeholder="Title..." style="margin-bottom:12px;">
                    <textarea id="note-content" class="form-control" placeholder="Write here..." style="height:250px; resize:none; font-family:monospace;"></textarea>
                    <button class="btn-3d" style="margin-top:12px; width:100%;" onclick="OS.saveNote()">Save</button>
                `;
            }

            renderFiles(container) {
                container.innerHTML = '<div id="file-list" style="max-height:350px; overflow-y:auto;"></div>';
                this.updateFileList();
            }

            renderMusic(container) {
                container.innerHTML = `
                    <input type="file" id="music-file" accept="audio/*" style="display:none;">
                    <button class="btn-3d" onclick="document.getElementById('music-file').click()">Upload Music</button>
                    <audio id="audio-player" controls style="width:100%; margin-top:20px;"></audio>
                    <canvas id="visualizer" width="550" height="200" style="background:#000; border-radius:12px; margin-top:20px; width:100%;"></canvas>
                `;
            }

            renderCode(container) {
                container.innerHTML = `
                    <textarea id="code-editor" class="form-control" style="height:350px; font-family:monospace; resize:none;"></textarea>
                    <button class="btn-3d" style="margin-top:12px;">Save Code</button>
                `;
            }

            renderGames(container) {
                container.innerHTML = `
                    <div style="padding:20px; text-align:center;">
                        <h3>Games Coming Soon</h3>
                        <button class="btn-3d" onclick="OS.playSnakeGame(this.parentElement.parentElement)">Play Snake</button>
                    </div>
                `;
            }

            renderSettings(container) {
                container.innerHTML = `
                    <h5>System Settings</h5>
                    <div style="margin-top:20px;">
                        <label>
                            <input type="checkbox" onchange="OS.setTheme('dark')" checked> Dark Mode
                        </label>
                    </div>
                `;
            }

            updateFileList() {
                const list = document.getElementById('file-list');
                if (!list) return;
                this.db.files.toArray().then(files => {
                    list.innerHTML = files.map(f => `
                        <div style="padding:8px; background:rgba(0,242,254,0.1); margin:5px 0; border-radius:8px; display:flex; justify-content:space-between;">
                            <span>${f.name}</span>
                            <button class="btn-3d" style="font-size:0.7rem; padding:4px 8px;" onclick="OS.deleteFile(${f.id})">Del</button>
                        </div>
                    `).join('');
                });
            }

            uploadFiles(files) {
                for (const file of files) {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const encrypted = CryptoJS.AES.encrypt(e.target.result, 'key').toString();
                        await this.db.files.add({ name: file.name, content: encrypted, modified: new Date() });
                        this.updateFileList();
                        this.showNotification('Upload', `${file.name} uploaded`);
                    };
                    reader.readAsText(file);
                }
            }

            deleteFile(id) {
                this.db.files.delete(id);
                this.updateFileList();
            }

            saveNote() {
                const title = document.getElementById('note-title').value;
                const content = document.getElementById('note-content').value;
                if (title && content) {
                    this.db.notes.add({ title, content, modified: new Date() });
                    this.showNotification('Notes', 'Note saved');
                }
            }

            maximizeWindow(id) {
                const win = this.windows.get(id)?.element;
                if (win) win.classList.toggle('maximized');
            }

            closeWindow(id) {
                this.windows.get(id)?.element.remove();
                this.windows.delete(id);
            }

            setupListeners() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && document.activeElement.id === 'term-input') {
                        this.executeTerminalCmd();
                    }
                });
            }

            toggleSidebar() {
                document.getElementById('control-center').classList.toggle('active');
            }

            setTheme(theme) {
                const root = document.documentElement;
                if (theme === 'light') {
                    root.style.setProperty('--dark', '#f5f5f5');
                    root.style.setProperty('--text', '#333');
                } else if (theme === 'cyber') {
                    root.style.setProperty('--primary', '#00ff00');
                } else {
                    root.style.setProperty('--dark', '#0a0f2a');
                    root.style.setProperty('--text', '#f0f0f0');
                }
                localStorage.setItem('theme', theme);
            }

            togglePrivacyMode() {
                document.body.style.filter = document.body.style.filter ? '' : 'invert(1) hue-rotate(180deg)';
            }

            resetOS() {
                if (confirm('Reset all data?')) {
                    localStorage.clear();
                    this.db.delete();
                    location.reload();
                }
            }

            showNotification(title, msg) {
                const container = document.getElementById('notification-container');
                const toast = document.createElement('div');
                toast.className = 'notification-toast';
                toast.innerHTML = `<strong>${title}</strong><br>${msg}`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        }

        // ===== GRAPHICS ENGINE =====
        class GraphicsEngine {
            constructor(container) {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 2, 12);
                this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                container.appendChild(this.renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0x404060, 0.7);
                this.scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 10, 7);
                this.scene.add(dirLight);

                // Torus knot
                const geom = new THREE.TorusKnotGeometry(1.2, 0.3, 200, 32);
                const mat = new THREE.MeshStandardMaterial({ color: 0x00f2fe, metalness: 0.8, roughness: 0.2 });
                this.knot = new THREE.Mesh(geom, mat);
                this.scene.add(this.knot);

                // Wireframe
                const wireMat = new THREE.MeshBasicMaterial({ color: 0x88ccff, wireframe: true, transparent: true, opacity: 0.2 });
                this.wireKnot = new THREE.Mesh(geom, wireMat);
                this.scene.add(this.wireKnot);

                // Particles
                const partGeom = new THREE.BufferGeometry();
                const positions = new Float32Array(1500 * 3);
                for (let i = 0; i < 1500; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 50;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 30;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 40 - 10;
                }
                partGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const partMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.1, transparent: true, opacity: 0.5 });
                this.particles = new THREE.Points(partGeom, partMat);
                this.scene.add(this.particles);

                this.animate();
                window.addEventListener('resize', () => this.onResize());
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const time = Date.now() * 0.0008;
                this.knot.rotation.x = time * 0.3;
                this.knot.rotation.y = time * 0.5;
                this.wireKnot.rotation.copy(this.knot.rotation);
                this.particles.rotation.y = time * 0.05;
                this.camera.position.x = Math.sin(time * 0.2) * 0.5;
                this.camera.lookAt(0, 0, 0);
                this.renderer.render(this.scene, this.camera);
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        // Initialize
        const OS = SinghPriyaOS.getInstance();
        window.addEventListener('load', () => OS.init());
    </script>
</body>
